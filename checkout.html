<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
  font-family: Arial;
  background: linear-gradient(to bottom, #4facfe, #00c6ff);
}

.container {
  padding: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 15px;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}

button {
  background: #007BFF;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
<h2>Checkout</h2>

<div class="card">
  <input type="text" placeholder="Alamat Lengkap">
  
  <select>
    <option>Transfer Bank</option>
    <option>E-Wallet</option>
    <option>COD</option>
  </select>

  <button onclick="checkout()">Bayar</button>
</div>

</div>

<script>
function checkout(){
  confetti({
    particleCount: 200,
    spread: 70,
    origin: { y: 0.6 }
  });

  localStorage.removeItem("cart");
  alert("Pembayaran berhasil!");
}
</script>

</body>
</html>
